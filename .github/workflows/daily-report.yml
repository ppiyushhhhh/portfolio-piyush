name: Daily Website Health Report

on:
  schedule:
    # 19:00 IST == 13:30 UTC
    - cron: "30 13 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install report dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Generate and email report
        working-directory: scripts
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
          DD_SITE: ${{ secrets.DD_SITE }}
          DD_RUM_APPLICATION_ID: ${{ secrets.DD_RUM_APPLICATION_ID }}
          SITE_DOMAIN: ${{ secrets.SITE_DOMAIN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          REPORT_FROM: ${{ secrets.REPORT_FROM }}
        run: node generate-report.mjs

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-website-report
          path: reports/*.pdf
          retention-days: 30
