name: Daily Website Health Report

on:
  schedule:
    # Runs every day at 7:00 PM IST (13:30 UTC)
    - cron: "30 13 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Report Dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Generate and Email Report
        working-directory: scripts
        env:
          SITE_DOMAIN: piyushprasad.in
          SMTP_HOST: ${{ smtp.gmail.com }}
          SMTP_PORT: ${{ 465 }}
          SMTP_USER: ${{ hursh230@gmail.com }}
          SMTP_PASS: ${{ ocbcsyhchmhmogdl }}
          REPORT_TO: ${{ hello.piyushprasad.in }}
          REPORT_FROM: ${{ hursh230@gmail.com }}
          ALERT_TO: ${{ hello.piyushprasad.in }}
        run: node generate-report.mjs

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-website-report
          path: scripts/reports/*.pdf
          retention-days: 30
